name: Continuous Integration with GitHub Actions

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: Permitir execucao do Maven Wrapper
        run: chmod +x mvnw

      - name: Executar testes
        run: ./mvnw -B test

      - name: Gerar artefato JAR
        run: ./mvnw -B clean package -DskipTests

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build da imagem Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mauriciorafaelveiga:latest .

      - name: Tag da execucao
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/mauriciorafaelveiga:latest ${{ secrets.DOCKER_USERNAME }}/mauriciorafaelveiga:${{ github.run_id }}

      - name: Publicar imagens no Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mauriciorafaelveiga:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mauriciorafaelveiga:${{ github.run_id }}
